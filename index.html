<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeToMusic - AI Playlist Converter</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const mockTracks = [
            { id: "1", title: "Blinding Lights", artist: "The Weeknd", duration: "3:20", cover: "https://picsum.photos/seed/track1/80/80", selected: true },
            { id: "2", title: "Levitating", artist: "Dua Lipa", duration: "3:23", cover: "https://picsum.photos/seed/track2/80/80", selected: true },
            { id: "3", title: "Save Your Tears", artist: "The Weeknd", duration: "3:35", cover: "https://picsum.photos/seed/track3/80/80", selected: true },
            { id: "4", title: "Peaches", artist: "Justin Bieber", duration: "3:18", cover: "https://picsum.photos/seed/track4/80/80", selected: false },
            { id: "5", title: "Stay", artist: "The Kid LAROI, Justin Bieber", duration: "2:21", cover: "https://picsum.photos/seed/track5/80/80", selected: true },
            { id: "6", title: "Good 4 U", artist: "Olivia Rodrigo", duration: "2:58", cover: "https://picsum.photos/seed/track6/80/80", selected: true }
        ];

        function TubeToMusic() {
            const [step, setStep] = useState("search");
            const [youtubeUrl, setYoutubeUrl] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [tracks, setTracks] = useState(mockTracks);
            const [syncProgress, setSyncProgress] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);

            const handleAnalyze = () => {
                if (!youtubeUrl) return;
                setIsAnalyzing(true);
                setTimeout(() => {
                    setIsAnalyzing(false);
                    setStep("select");
                }, 2000);
            };

            const handleToggleTrack = (id) => {
                setTracks(tracks.map((track) => track.id === id ? { ...track, selected: !track.selected } : track));
            };

            const handleSelectAll = () => {
                const allSelected = tracks.every((t) => t.selected);
                setTracks(tracks.map((track) => ({ ...track, selected: !allSelected })));
            };

            const handleSync = async () => {
                setIsSyncing(true);
                setSyncProgress(0);
                
                for (let i = 0; i <= 100; i += 5) {
                    await new Promise((resolve) => setTimeout(resolve, 100));
                    setSyncProgress(i);
                }
                setIsSyncing(false);
                setStep("success");
            };

            const selectedCount = tracks.filter((t) => t.selected).length;

            return (
                <div className="min-h-screen bg-[#09090b] text-[#fafafa]">
                    <header className="border-b border-zinc-800 bg-zinc-950/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="container mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 rounded-xl bg-green-500 flex items-center justify-center shadow-lg shadow-green-500/20">
                                    <i className="fa-solid fa-music text-black text-lg"></i>
                                </div>
                                <span className="text-xl font-bold tracking-tight">TubeToMusic</span>
                            </div>
                            <nav className="hidden md:flex items-center gap-6 text-sm text-zinc-400">
                                <a href="#" className="hover:text-white transition-colors">How it works</a>
                                <a href="#" className="hover:text-white transition-colors">Pricing</a>
                                <a href="#" className="hover:text-white transition-colors">Support</a>
                            </nav>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-8 md:py-16">
                        <div className="flex items-center justify-center gap-2 mb-12">
                            {["search", "select", "success"].map((s, i) => (
                                <div key={s} className="flex items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition-all duration-300 ${step === s || (step === "select" && i < 1) || (step === "success" && i < 2) ? "bg-green-500 text-black shadow-md shadow-green-500/20" : "bg-zinc-800 text-zinc-400"}`}>
                                        {i + 1}
                                    </div>
                                    {i < 2 && <div className={`w-16 md:w-24 h-0.5 mx-2 transition-all duration-300 ${(step === "select" && i === 0) || (step === "success" && i <= 1) ? "bg-green-500" : "bg-zinc-800"}`} />}
                                </div>
                            ))}
                        </div>

                        {step === "search" && (
                            <div className="transition-all duration-500 ease-out max-w-2xl mx-auto text-center animate-fadeIn">
                                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-green-500/10 text-green-400 text-sm mb-6">
                                    <i className="fa-solid fa-wand-magic-sparkles"></i> AI-Powered Music Detection
                                </div>
                                <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight">
                                    Convert YouTube to <span className="text-green-500">Your Playlist</span>
                                </h1>
                                <p className="text-zinc-400 text-lg mb-8">
                                    유튜브 영상이나 믹스 링크를 붙여넣으세요. AI가 트랙 리스트를 추출해 유튜브 뮤직 보관함으로 바로 전송해 드립니다.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-3 max-w-xl mx-auto">
                                    <div className="relative flex-1">
                                        <i className="fa-brands fa-youtube absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl"></i>
                                        <input type="url" placeholder="유튜브 링크를 여기에 붙여넣으세요..." value={youtubeUrl} onChange={(e) => setYoutubeUrl(e.target.value)} className="w-full pl-12 pr-4 h-14 bg-zinc-900 border border-zinc-800 rounded-xl text-white placeholder:text-zinc-500 focus:outline-none focus:border-green-500 transition-colors" />
                                    </div>
                                    <button onClick={handleAnalyze} disabled={!youtubeUrl || isAnalyzing} className="h-14 px-8 bg-green-500 hover:bg-green-400 disabled:bg-zinc-800 disabled:text-zinc-500 text-black font-bold rounded-xl transition-all flex items-center justify-center gap-2">
                                        {isAnalyzing ? <><i className="fa-solid fa-spinner animate-spin"></i> Analyzing...</> : <><i className="fa-solid fa-magnifying-glass"></i> Analyze</>}
                                    </button>
                                </div>
                                <div className="grid md:grid-cols-3 gap-6 mt-16 max-w-4xl mx-auto text-left">
                                    <div className="p-6 rounded-2xl bg-zinc-900/50 border border-zinc-800/80"><i className="fa-solid fa-magnifying-glass text-xl text-green-500 mb-4 block"></i><h3 className="font-semibold mb-2">Smart Detection</h3><p className="text-sm text-zinc-400">오디오 지문 인식을 활용한 정밀한 곡명 탐지</p></div>
                                    <div className="p-6 rounded-2xl bg-zinc-900/50 border border-zinc-800/80"><i className="fa-solid fa-list-music text-xl text-green-500 mb-4 block"></i><h3 className="font-semibold mb-2">Batch Import</h3><p className="text-sm text-zinc-400">긴 타임라인 영상에서도 한 번에 모든 곡 추출</p></div>
                                    <div className="p-6 rounded-2xl bg-zinc-900/50 border border-zinc-800/80"><i className="fa-solid fa-rotate text-xl text-green-500 mb-4 block"></i><h3 className="font-semibold mb-2">One-Click Sync</h3><p className="text-sm text-zinc-400">유튜브 뮤직 라이브러리로 즉시 자동 스트리밍 연동</p></div>
                                </div>
                            </div>
                        )}

                        {step === "select" && (
                            <div className="max-w-3xl mx-auto">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-2">Tracks Found</h2>
                                    <p className="text-zinc-400">영상 내에서 총 {tracks.length}개의 노래를 찾아냈습니다. 동기화할 곡들을 골라주세요.</p>
                                </div>
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-xl">
                                    <div className="flex items-center justify-between px-6 py-4 border-b border-zinc-800 bg-zinc-950/40">
                                        <button onClick={handleSelectAll} className="flex items-center gap-3 text-sm text-zinc-400 hover:text-white transition-colors font-medium">
                                            <input type="checkbox" checked={tracks.every((t) => t.selected)} onChange={handleSelectAll} className="w-4 h-4 rounded border-zinc-700 text-green-500 focus:ring-green-500 bg-zinc-800 accent-green-500" />
                                            Select All
                                        </button>
                                        <span className="text-sm text-zinc-400 font-medium">{selectedCount} of {tracks.length} selected</span>
                                    </div>
                                    <div className="divide-y divide-zinc-800/40">
                                        {tracks.map((track) => (
                                            <div key={track.id} className={`flex items-center gap-4 px-6 py-4 hover:bg-zinc-800/30 transition-colors cursor-pointer ${track.selected ? "bg-green-500/5" : ""}`} onClick={() => handleToggleTrack(track.id)}>
                                                <input type="checkbox" checked={track.selected} onChange={() => handleToggleTrack(track.id)} onClick={(e) => e.stopPropagation()} className="w-4 h-4 rounded border-zinc-700 text-green-500 focus:ring-green-500 bg-zinc-800 accent-green-500" />
                                                <img src={track.cover} alt={track.title} className="w-12 h-12 rounded-lg object-cover border border-zinc-800" />
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-semibold truncate text-zinc-100">{track.title}</p>
                                                    <p className="text-sm text-zinc-400 truncate mt-0.5">{track.artist}</p>
                                                </div>
                                                <div className="flex items-center gap-4 text-zinc-400">
                                                    <span className="text-sm flex items-center gap-1.5"><i className="fa-regular fa-clock text-xs"></i> {track.duration}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="mt-8 flex flex-col items-center gap-4">
                                    {isSyncing ? (
                                        <div className="w-full max-w-md bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                                            <div className="flex items-center justify-between mb-2 text-sm font-medium">
                                                <span>Syncing to YouTube Music...</span>
                                                <span className="text-green-400 font-bold">{syncProgress}%</span>
                                            </div>
                                            <div className="h-2.5 bg-zinc-800 rounded-full overflow-hidden">
                                                <div className="h-full bg-green-500 rounded-full transition-all duration-200 ease-out shadow-[0_0_12px_rgba(34,197,94,0.4)]" style={{ width: `${syncProgress}%` }} />
                                            </div>
                                        </div>
                                    ) : (
                                        <button onClick={handleSync} disabled={selectedCount === 0} className="h-14 px-8 bg-green-500 hover:bg-green-400 disabled:bg-zinc-800 disabled:text-zinc-500 text-black font-bold rounded-xl transition-all flex items-center justify-center gap-2 text-base shadow-lg shadow-green-500/10">
                                            <i className="fa-solid fa-arrows-rotate"></i> Sync {selectedCount} Tracks to YouTube Music
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {step === "success" && (
                            <div className="max-w-2xl mx-auto text-center animate-scaleUp">
                                <div className="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                                    <div className="absolute inset-0 bg-green-500/20 rounded-full animate-ping" />
                                    <div className="relative w-24 h-24 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-500/30">
                                        <i className="fa-solid fa-circle-check text-black text-4xl"></i>
                                    </div>
                                </div>
                                <h2 className="text-3xl font-bold mb-2 tracking-tight">Successfully Synced!</h2>
                                <p className="text-zinc-400 mb-8">{selectedCount}개의 음악이 내 보관함에 정상 등록 완료되었습니다.</p>
                                
                                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 text-left shadow-xl">
                                    <div className="flex flex-col sm:flex-row items-center sm:items-start gap-6 mb-6">
                                        <div className="w-32 h-32 rounded-2xl bg-gradient-to-br from-green-500 to-green-900 flex items-center justify-center shrink-0 shadow-lg shadow-green-500/10">
                                            <i className="fa-solid fa-music text-black text-4xl"></i>
                                        </div>
                                        <div className="flex-1 text-center sm:text-left">
                                            <p className="text-xs text-green-400 font-bold tracking-wider mb-1">NEW PLAYLIST</p>
                                            <h3 className="text-2xl font-bold mb-2">YouTube Import</h3>
                                            <div className="flex items-center justify-center sm:justify-start gap-3 text-sm text-zinc-400">
                                                <span>{selectedCount} tracks</span>
                                                <span>•</span>
                                                <span>Created just now</span>
                                            </div>
                                            <div className="flex flex-wrap gap-3 mt-4 justify-center sm:justify-start">
                                                <button className="px-5 py-2.5 bg-green-500 hover:bg-green-400 text-black font-bold rounded-xl transition-all flex items-center gap-2 text-sm"><i className="fa-solid fa-play"></i> Play Now</button>
                                                <button className="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-white font-medium rounded-xl border border-zinc-700 transition-all text-sm">Open in YouTube Music</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="border-t border-zinc-800/60 pt-4">
                                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-wider mb-3">Tracks in playlist</p>
                                        <div className="space-y-1">
                                            {tracks.filter((t) => t.selected).slice(0, 4).map((track, idx) => (
                                                <div key={track.id} className="flex items-center gap-3 p-2 rounded-xl hover:bg-zinc-800/20 transition-colors">
                                                    <span className="w-4 text-center text-xs text-zinc-500 font-semibold">{idx + 1}</span>
                                                    <img src={track.cover} alt={track.title} className="w-9 h-9 rounded-md object-cover" />
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-medium text-sm text-zinc-200 truncate">{track.title}</p>
                                                        <p className="text-xs text-zinc-400 truncate mt-0.5">{track.artist}</p>
                                                    </div>
                                                    <span className="text-xs text-zinc-500">{track.duration}</span>
                                                </div>
                                            ))}
                                            {selectedCount > 4 && <p className="text-xs text-zinc-500 text-center pt-3 font-medium">+ {selectedCount - 4} more tracks</p>}
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-8">
                                    <button onClick={() => { setStep("search"); setYoutubeUrl(""); setTracks(mockTracks); }} className="px-6 py-3 bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 text-zinc-300 font-semibold rounded-xl transition-all">Convert Another Video</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-zinc-900 mt-16 bg-zinc-950/20">
                        <div className="container mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-zinc-500">
                            <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-md bg-green-500/20 flex items-center justify-center"><i className="fa-solid fa-music text-green-500 text-2xs"></i></div><span className="font-bold text-zinc-400">TubeToMusic</span></div>
                            <p>© 2026 TubeToMusic. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TubeToMusic />);
    </script>
</body>
</html>

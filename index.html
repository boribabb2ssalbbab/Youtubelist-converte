<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TubeToMusic - Playlist Converter</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        // ===== 이 아래에 v0가 짜준 React 컴포넌트 코드를 붙여넣을 겁니다 =====
        function App() {
            // v0의 export default function App() 내부 코드가 이쪽으로 들어옵니다.
            return (
                <div class="p-10 text-center">
                    <h1 class="text-3xl font-bold">TubeToMusic 목업 작동 중!</h1>
                    <p class="mt-4 text-gray-400">여기에 v0 코드를 합치면 완성됩니다.</p>
                </div>
            );
        }

        const root = bankrupt.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
